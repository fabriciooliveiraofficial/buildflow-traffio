name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Build Hash File
        run: |
          echo "${{ github.sha }}" > build-hash.txt
          # Inject hash into Service Worker to force update and cache clear
          sed -i "s/const CACHE_VERSION = '.*';/const CACHE_VERSION = 'v1.1.6-${{ github.sha }}';/" sw.js

      - name: Deploy via SSH/Rsync
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: 65002
          TARGET: /home/u714643564/domains/buildflow-traffio.com/public_html/
          EXCLUDE: "/.git/, /.github/, /mysql-data/, /legacy/, /_public_html/, /Dockerfile, /docker-compose.yml, /.agent/, /docs/, README.md, .env"
          ARGS: "-rlgoDzvc -i --delete"
