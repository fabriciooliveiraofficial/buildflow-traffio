version: '3.8'

services:
  # Web Application (PHP-Apache)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffio_app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=traffio_erp
      - DB_USER=traffio
      - DB_PASS=secure_pass
    networks:
      - traffio-net
    depends_on:
      - db

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: traffio_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: traffio_erp
      MYSQL_USER: traffio
      MYSQL_PASSWORD: secure_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql-data:/var/lib/mysql
      # Initialize database with schema on first run
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - traffio-net
    command: --default-authentication-plugin=mysql_native_password

  # Database Management (PHPMyAdmin)
  pma:
    image: phpmyadmin/phpmyadmin
    container_name: traffio_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: traffio
      PMA_PASSWORD: secure_pass
    networks:
      - traffio-net
    depends_on:
      - db

  # Live Reload Proxy (BrowserSync)
  live:
    image: node:18-alpine
    container_name: traffio_live
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3005:3000"
      - "3001:3001"
    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'app:80' --files '**/*.php, **/*.css, **/*.js' --no-open --port 3000 --host 0.0.0.0"
    networks:
      - traffio-net
    depends_on:
      - app

networks:
  traffio-net:
    driver: bridge

volumes:
  mysql-data:
